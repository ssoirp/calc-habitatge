<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Calculadora de compra d'habitatge — Catalunya</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fa;--card:#fff;--border:#dee2e6;--text:#212529;--muted:#6c757d;
  --green:#198754;--green-bg:#d1e7dd;--yellow:#ffc107;--yellow-bg:#fff3cd;
  --red:#dc3545;--red-bg:#f8d7da;--blue:#0d6efd;--blue-bg:#cfe2ff;
  --best-bg:#e8f5e9;--best-border:#4caf50;
  --radius:10px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;padding:0;min-height:100dvh}
.container{max-width:900px;margin:0 auto;padding:12px}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:16px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:.9rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:.2s}
.tab.active{background:var(--blue);color:#fff}
.tab-content{display:none}
.tab-content.active{display:block}

h1{font-size:1.3rem;text-align:center;margin-bottom:2px}
.subtitle{text-align:center;color:var(--muted);font-size:.8rem;margin-bottom:14px}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.card h2{font-size:.85rem;margin-bottom:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* Inputs */
.field{margin-bottom:10px}
.field label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:2px}
.field input[type=number]{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:1rem;background:#fff;-webkit-appearance:none;-moz-appearance:textfield}
.field input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(13,110,253,.12)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:400px){.field-row{grid-template-columns:1fr}}

/* Toggle */
.toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:8px 0}
.toggle{position:relative;width:48px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:#ccc;border-radius:26px;cursor:pointer;transition:.2s}
.toggle .slider:before{content:"";position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:var(--blue)}
.toggle input:checked+.slider:before{transform:translateX(22px)}

/* Summary chips */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:6px;margin-bottom:14px}
.summary-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 6px;text-align:center}
.summary-item .val{font-size:1.05rem;font-weight:700}
.summary-item .lbl{font-size:.7rem;color:var(--muted)}

/* Alerts */
.alerts{margin-bottom:14px;display:flex;flex-direction:column;gap:6px}
.alert{padding:10px 12px;border-radius:8px;font-size:.82rem;display:none}
.alert-warn{background:var(--yellow-bg);color:#664d03;border:1px solid #ffecb5}
.alert-danger{background:var(--red-bg);color:#842029;border:1px solid #f5c2c7}
.alert-info{background:var(--blue-bg);color:#084298;border:1px solid #b6d4fe}
.alert.show{display:block}

/* Table — mobile cards */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:.82rem;min-width:600px}
th,td{padding:7px 8px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
th{background:#f1f3f5;font-weight:600;color:var(--muted);position:sticky;top:0}
th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:inherit;z-index:1}
th:first-child{z-index:2;background:#f1f3f5}
td .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:600}
.badge-ok{background:var(--green-bg);color:var(--green)}
.badge-warn{background:var(--yellow-bg);color:#664d03}
.badge-no{background:var(--red-bg);color:var(--red)}

/* Mobile cards view */
.mob-cards{display:none;gap:10px}
@media(max-width:680px){
  .table-wrap{display:none}
  .mob-cards{display:flex;flex-direction:column}
}
.mob-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;position:relative}
.mob-card.best{border-color:var(--best-border);border-width:2px;background:var(--best-bg)}
.mob-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mob-card-header .pct{font-size:1.2rem;font-weight:700}
.mob-card-header .star{color:var(--green);font-size:.8rem;font-weight:600}
.mob-card-rows{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}
.mob-card-rows .r{display:flex;justify-content:space-between;font-size:.82rem;padding:3px 0;border-bottom:1px solid #f1f3f5}
.mob-card-rows .r:last-child{border:none}
.mob-card-rows .r .k{color:var(--muted)}
.mob-card-rows .r .v{font-weight:500;text-align:right}
@media(max-width:450px){.mob-card-rows{grid-template-columns:1fr}}
.mob-card-footer{margin-top:10px;display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:2px solid var(--border)}
.mob-card-footer .diff{font-size:1rem;font-weight:700}
.mob-card.best .mob-card-footer{border-top-color:var(--best-border)}

/* Percentatge chips */
.pct-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.pct-chip{display:flex;align-items:center;gap:4px;background:#f1f3f5;border-radius:6px;padding:4px 8px;font-size:.82rem}
.pct-chip input{width:52px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:.85rem;text-align:center}
.pct-chip button{background:none;border:none;cursor:pointer;color:var(--red);font-size:1.1rem;line-height:1;padding:2px}
.add-pct{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:.82rem;cursor:pointer}

/* REDUX view */
.redux-price{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.redux-price label{font-size:.85rem;font-weight:600;white-space:nowrap}
.redux-price input{flex:1;padding:12px 14px;border:1px solid var(--border);border-radius:8px;font-size:1.15rem;font-weight:600;text-align:center}
.redux-price input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(13,110,253,.12)}

.redux-params{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.redux-params .field input{padding:8px 10px;font-size:.9rem}

.redux-grid{display:grid;grid-template-columns:1fr;gap:12px}
.redux-block{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.redux-block-header{padding:12px 14px;font-weight:700;font-size:1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.redux-block-header .star{color:var(--green);font-size:.75rem;background:var(--green-bg);padding:2px 8px;border-radius:10px}
.redux-block.best{border-color:var(--best-border);border-width:2px}
.redux-block.best .redux-block-header{background:var(--best-bg)}
.redux-sub{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border)}
.redux-sub:first-of-type{border-top:none}
.redux-col{padding:10px 14px}
.redux-col:first-child{border-right:1px solid var(--border)}
.redux-col-title{font-size:.72rem;text-transform:uppercase;color:var(--muted);font-weight:600;letter-spacing:.5px;margin-bottom:6px}
.redux-line{display:flex;justify-content:space-between;font-size:.82rem;padding:3px 0}
.redux-line .k{color:var(--muted)}
.redux-line .v{font-weight:600;text-align:right}
.redux-line.total{border-top:1px solid var(--border);margin-top:4px;padding-top:6px;font-size:.9rem}
.redux-line.total .v{font-size:1rem}
.redux-monthly{padding:10px 14px;background:#f8f9fa;border-top:1px solid var(--border)}
.redux-monthly-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;text-align:center}
@media(max-width:500px){.redux-monthly-grid{grid-template-columns:1fr}}
.redux-monthly-item .val{font-size:1.05rem;font-weight:700}
.redux-monthly-item .lbl{font-size:.68rem;color:var(--muted)}
.redux-status{padding:10px 14px;text-align:center;font-weight:600;font-size:.85rem}
.redux-status.ok{background:var(--green-bg);color:var(--green)}
.redux-status.warn{background:var(--yellow-bg);color:#664d03}
.redux-status.no{background:var(--red-bg);color:var(--red)}

footer{text-align:center;color:var(--muted);font-size:.72rem;margin-top:16px;padding-bottom:24px}
</style>
</head>
<body>
<div class="container">
<h1>Calculadora d'habitatge</h1>
<p class="subtitle">Catalunya — ITP, hipoteca i despeses</p>

<div class="tabs">
  <button class="tab active" data-tab="full">Completa</button>
  <button class="tab" data-tab="redux">Redux</button>
</div>

<!-- ==================== FULL VIEW ==================== -->
<div class="tab-content active" id="tab-full">

<div class="summary-grid" id="summary"></div>
<div class="alerts" id="alerts">
  <div class="alert alert-info" id="alert-frac"></div>
  <div class="alert alert-warn" id="alert-margin"></div>
  <div class="alert alert-warn" id="alert-agency"></div>
  <div class="alert alert-warn" id="alert-90"></div>
  <div class="alert alert-danger" id="alert-none"></div>
</div>

<div class="card">
  <h2>Preu i estalvis</h2>
  <div class="field-row">
    <div class="field"><label>Preu del pis (€)</label><input type="number" id="price" value="225000" step="1000"></div>
    <div class="field"><label>Estalvis propis (€)</label><input type="number" id="savings" value="35000" step="500"></div>
  </div>
  <div class="field"><label>Donació rebuda (€)</label><input type="number" id="donation" value="20000" step="500"></div>
</div>

<div class="card">
  <h2>Impostos i despeses</h2>
  <div class="field-row">
    <div class="field"><label>ITP (%)</label><input type="number" id="itp" value="10" step="0.5" min="0" max="100"></div>
    <div class="field"><label>Honoraris agència (%)</label><input type="number" id="agency" value="2.5" step="0.1" min="0" max="100"></div>
  </div>
  <div class="field-row">
    <div class="field"><label>IVA honoraris agència (%)</label><input type="number" id="agencyVat" value="21" step="1" min="0" max="100"></div>
    <div class="field"><label>Despeses fixes (€)</label><input type="number" id="fixed" value="3000" step="100"></div>
  </div>
</div>

<div class="card">
  <h2>Hipoteca</h2>
  <div class="field-row">
    <div class="field"><label>Interès anual (%)</label><input type="number" id="rate" value="2.4" step="0.1" min="0" max="20"></div>
    <div class="field"><label>Termini (anys)</label><input type="number" id="years" value="30" step="1" min="1" max="50"></div>
  </div>
  <div style="margin-top:8px">
    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" id="fracToggle"><span class="slider"></span></label>
      <span style="font-size:.85rem;font-weight:500">Fraccionar ITP</span>
    </div>
    <div class="field-row" id="fracFields">
      <div class="field"><label>Mesos fraccionament</label><input type="number" id="fracMonths" value="36" step="1" min="1" max="120"></div>
      <div class="field"><label>Interessos fracc. (%)</label><input type="number" id="fracRate" value="0" step="0.1" min="0" max="20"></div>
    </div>
  </div>
</div>

<div class="card">
  <h2>% hipoteca a comparar</h2>
  <div class="pct-chips" id="pctChips"></div>
  <button class="add-pct" id="addPct">+ Afegir</button>
</div>

<div class="table-wrap">
  <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
</div>
<div class="mob-cards" id="mobCards"></div>

</div>

<!-- ==================== REDUX VIEW ==================== -->
<div class="tab-content" id="tab-redux">

<div class="redux-price">
  <label>Preu total €</label>
  <input type="number" id="rx-price" value="225000" step="1000">
</div>

<div class="redux-params">
  <div class="field"><label>Estalvis (€)</label><input type="number" id="rx-savings" value="35000" step="500"></div>
  <div class="field"><label>Donació (€)</label><input type="number" id="rx-donation" value="20000" step="500"></div>
  <div class="field"><label>ITP (%)</label><input type="number" id="rx-itp" value="10" step="0.5"></div>
  <div class="field"><label>Agència (%+IVA)</label><input type="number" id="rx-agency" value="2.5" step="0.1"></div>
  <div class="field"><label>IVA agència (%)</label><input type="number" id="rx-agencyVat" value="21" step="1"></div>
  <div class="field"><label>Despeses fixes (€)</label><input type="number" id="rx-fixed" value="3000" step="100"></div>
  <div class="field"><label>Interès (%)</label><input type="number" id="rx-rate" value="2.4" step="0.1"></div>
  <div class="field"><label>Anys</label><input type="number" id="rx-years" value="30" step="1" min="1"></div>
  <div class="field"><label>Mesos fracc. ITP</label><input type="number" id="rx-fracMonths" value="36" step="1" min="1"></div>
  <div class="field"><label>Int. fracc. (%)</label><input type="number" id="rx-fracRate" value="0" step="0.1"></div>
</div>

<div class="redux-grid" id="reduxGrid"></div>

</div>

<footer>Eina orientativa — consulta un professional abans de prendre decisions financeres.</footer>
</div>

<script>
const fmt = v => v.toLocaleString('ca-ES',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
const fmtShort = v => v.toLocaleString('ca-ES',{minimumFractionDigits:0,maximumFractionDigits:0}) + ' €';

let pcts = [80, 85, 90, 95, 100];
const $ = id => document.getElementById(id);
const val = id => parseFloat($(id).value) || 0;

// ---- Tabs ----
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    $('tab-' + t.dataset.tab).classList.add('active');
    if (t.dataset.tab === 'redux') calcRedux();
  });
});

// ---- Pct chips ----
function renderChips() {
  const c = $('pctChips'); c.innerHTML = '';
  pcts.forEach((p, i) => {
    const d = document.createElement('div'); d.className = 'pct-chip';
    const inp = document.createElement('input');
    inp.type = 'number'; inp.value = p; inp.min = 1; inp.max = 100; inp.step = 1;
    inp.addEventListener('input', () => { pcts[i] = parseFloat(inp.value) || 0; calcFull(); });
    d.appendChild(inp); d.insertAdjacentHTML('beforeend', '%');
    if (pcts.length > 1) {
      const btn = document.createElement('button'); btn.textContent = '×';
      btn.addEventListener('click', () => { pcts.splice(i, 1); renderChips(); calcFull(); });
      d.appendChild(btn);
    }
    c.appendChild(d);
  });
}
$('addPct').addEventListener('click', () => { pcts.push(80); renderChips(); calcFull(); });

// ---- Shared math ----
function monthlyMortgage(principal, annualRate, years) {
  if (annualRate === 0) return principal / (years * 12);
  const i = annualRate / 100 / 12, n = years * 12;
  return principal * i / (1 - Math.pow(1 + i, -n));
}
function monthlyFrac(amount, months, annualRate) {
  if (annualRate === 0) return amount / months;
  const i = annualRate / 100 / 12;
  return amount * i / (1 - Math.pow(1 + i, -months));
}
function viability(available, cost) {
  const diff = available - cost;
  return diff >= 3000 ? 'ok' : diff >= 0 ? 'warn' : 'no';
}
const statusLabel = { ok: 'Quadra', warn: 'Va justa', no: 'No quadra' };

// ---- FULL calc ----
function calcFull() {
  const price = val('price'), savings = val('savings'), donation = val('donation');
  const itpPct = val('itp'), agencyPct = val('agency'), agencyVatPct = val('agencyVat');
  const fixedCosts = val('fixed'), rate = val('rate'), years = val('years');
  const fracOn = $('fracToggle').checked, fracMo = val('fracMonths'), fracRt = val('fracRate');

  const available = savings + donation;
  const itpTotal = price * itpPct / 100;
  const agencyNet = price * agencyPct / 100;
  const agencyVatAmt = agencyNet * agencyVatPct / 100;
  const agencyGross = agencyNet + agencyVatAmt;

  $('summary').innerHTML = [
    ['Preu', fmtShort(price)], ['Disponible', fmtShort(available)],
    ['ITP', fmtShort(itpTotal)], ['Agència', fmt(agencyGross)], ['Desp. fixes', fmtShort(fixedCosts)]
  ].map(([l,v]) => `<div class="summary-item"><div class="val">${v}</div><div class="lbl">${l}</div></div>`).join('');

  const sorted = [...pcts].sort((a,b) => a-b);
  const rows = sorted.map(pct => {
    const mortgage = price * pct / 100, entry = price - mortgage;
    const costNoFrac = entry + itpTotal + agencyGross + fixedCosts;
    const costFrac = entry + agencyGross + fixedCosts;
    const cost = fracOn ? costFrac : costNoFrac;
    const diff = available - cost;
    const status = viability(available, cost);
    const monthly = monthlyMortgage(mortgage, rate, years);
    const fracMonthly = fracOn ? monthlyFrac(itpTotal, fracMo, fracRt) : 0;
    return { pct, mortgage, entry, itpTotal, agencyNet, agencyVatAmt, agencyGross, fixedCosts, costNoFrac, costFrac, cost, diff, status, monthly, fracMonthly, totalDuring: monthly + fracMonthly, totalAfter: monthly, available };
  });

  let bestIdx = -1;
  for (let i = 0; i < rows.length; i++) {
    if (rows[i].status !== 'no' && (bestIdx === -1 || rows[i].pct < rows[bestIdx].pct)) bestIdx = i;
  }
  if (bestIdx === -1) { let mx = -Infinity; rows.forEach((r,i) => { if (r.diff > mx) { mx = r.diff; bestIdx = i; } }); }

  const badgeCls = { ok:'badge-ok', warn:'badge-warn', no:'badge-no' };

  // Desktop table
  $('thead').innerHTML = `<tr><th>Concepte</th>${rows.map((r,i) => `<th${i===bestIdx?' style="color:var(--green)"':''}>${r.pct}%${i===bestIdx?' ★':''}</th>`).join('')}</tr>`;
  const defs = [
    ['Hipoteca', r => fmt(r.mortgage)], ['Entrada', r => fmt(r.entry)],
    ['ITP', r => fmt(r.itpTotal)],
    ['Honoraris agència', r => fmt(r.agencyGross)],
    ['Despeses fixes', r => fmt(r.fixedCosts)],
    ['Cost inicial (s/ fracc.)', r => fmt(r.costNoFrac)],
    ['Cost inicial (amb fracc.)', r => fmt(r.costFrac)],
    ['—', null],
    ['Disponible', r => fmt(r.available)],
    ['Diferència', r => `<span style="color:${r.diff>=0?'var(--green)':'var(--red)'};font-weight:600">${r.diff>=0?'+':''}${fmt(r.diff)}</span>`],
    ['Resultat', r => `<span class="badge ${badgeCls[r.status]}">${statusLabel[r.status]}</span>`],
    ['—', null],
    ['Quota hipoteca/mes', r => fmt(r.monthly)],
  ];
  if (fracOn) {
    defs.push(['Quota ITP fracc./mes', r => fmt(r.fracMonthly)]);
    defs.push(['Total mensual (fracc.)', r => `<strong>${fmt(r.totalDuring)}</strong>`]);
    defs.push(['Total mensual (post)', r => fmt(r.totalAfter)]);
  }
  $('tbody').innerHTML = defs.map(([l,fn]) => {
    if (!fn) return `<tr><td colspan="${rows.length+1}" style="height:4px;border:none"></td></tr>`;
    return `<tr>${[`<td style="text-align:left;font-weight:500;background:var(--card)">${l}</td>`, ...rows.map((r,i) => `<td${i===bestIdx?' style="background:var(--best-bg)"':''}>${fn(r)}</td>`)].join('')}</tr>`;
  }).join('');

  // Mobile cards
  $('mobCards').innerHTML = rows.map((r, i) => {
    const isBest = i === bestIdx;
    const lines = [
      ['Hipoteca', fmt(r.mortgage)], ['Entrada', fmt(r.entry)],
      ['ITP', fmt(r.itpTotal)], ['Agència', fmt(r.agencyGross)],
      ['Desp. fixes', fmt(r.fixedCosts)],
      ['Cost s/fracc.', fmt(r.costNoFrac)], ['Cost fracc.', fmt(r.costFrac)],
      ['Quota/mes', fmt(r.monthly)],
    ];
    if (fracOn) { lines.push(['Quota fracc.', fmt(r.fracMonthly)]); lines.push(['Total/mes', fmt(r.totalDuring)]); }
    return `<div class="mob-card${isBest?' best':''}">
      <div class="mob-card-header">
        <span class="pct">${r.pct}%</span>
        ${isBest?'<span class="star">★ Millor opció</span>':''}
        <span class="badge ${badgeCls[r.status]}">${statusLabel[r.status]}</span>
      </div>
      <div class="mob-card-rows">${lines.map(([k,v]) => `<div class="r"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('')}</div>
      <div class="mob-card-footer">
        <span style="color:var(--muted);font-size:.82rem">Diferència</span>
        <span class="diff" style="color:${r.diff>=0?'var(--green)':'var(--red)'}">${r.diff>=0?'+':''}${fmt(r.diff)}</span>
      </div>
    </div>`;
  }).join('');

  // Alerts
  const anyOk = rows.some(r => r.status !== 'no');
  const allOkNoFrac = rows.some(r => available - r.costNoFrac >= 0);
  const onlyWithFrac = fracOn && anyOk && !allOkNoFrac;
  const anyWarn = rows.some(r => r.status === 'warn');
  const agencyBlocks = rows.some(r => r.status === 'no' && available - (r.cost - r.agencyGross) >= 0);
  const any90plus = rows.some(r => r.status !== 'no' && r.pct > 90);
  const noneViable = !anyOk;
  const sa = (id,show,msg) => { const el=$(id); el.classList.toggle('show',show); el.innerHTML=msg||''; };
  sa('alert-frac', onlyWithFrac, "💡 L'operació només quadra si fraccioneu l'ITP.");
  sa('alert-margin', anyWarn && !noneViable, '⚠️ Alguna opció va justa — marge < 3.000 €.');
  sa('alert-agency', agencyBlocks, "⚠️ Els honoraris d'agència fan que alguna opció no quadri.");
  sa('alert-90', any90plus, '⚠️ Hipoteques > 90% poden ser difícils d\'obtenir.');
  sa('alert-none', noneViable, '❌ Cap opció quadra amb els paràmetres actuals.');
}

// ---- REDUX calc ----
function calcRedux() {
  const price = val('rx-price'), savings = val('rx-savings'), donation = val('rx-donation');
  const itpPct = val('rx-itp'), agencyPct = val('rx-agency'), agencyVatPct = val('rx-agencyVat');
  const fixedCosts = val('rx-fixed'), rate = val('rx-rate'), years = val('rx-years');
  const fracMo = val('rx-fracMonths'), fracRt = val('rx-fracRate');

  const available = savings + donation;
  const itpTotal = price * itpPct / 100;
  const agencyNet = price * agencyPct / 100;
  const agencyVatAmt = agencyNet * agencyVatPct / 100;
  const agencyGross = agencyNet + agencyVatAmt;

  const reduxPcts = [90, 85, 80];
  const blocks = reduxPcts.map(pct => {
    const mortgage = price * pct / 100, entry = price - mortgage;
    const costNoFrac = entry + itpTotal + agencyGross + fixedCosts;
    const costFrac = entry + agencyGross + fixedCosts;
    const diffNoFrac = available - costNoFrac;
    const diffFrac = available - costFrac;
    const statusNoFrac = viability(available, costNoFrac);
    const statusFrac = viability(available, costFrac);
    const monthly = monthlyMortgage(mortgage, rate, years);
    const fracMonthly = monthlyFrac(itpTotal, fracMo, fracRt);
    return { pct, mortgage, entry, itpTotal, agencyGross, fixedCosts, costNoFrac, costFrac, diffNoFrac, diffFrac, statusNoFrac, statusFrac, monthly, fracMonthly, totalDuring: monthly + fracMonthly, totalAfter: monthly };
  });

  let bestIdx = -1;
  for (let i = 0; i < blocks.length; i++) {
    if (blocks[i].statusNoFrac !== 'no' || blocks[i].statusFrac !== 'no') {
      bestIdx = i; break;
    }
  }

  $('reduxGrid').innerHTML = blocks.map((b, i) => {
    const isBest = i === bestIdx;
    const bestStatus = b.statusNoFrac !== 'no' ? b.statusNoFrac : b.statusFrac;
    const bestLabel = b.statusNoFrac !== 'no' ? statusLabel[b.statusNoFrac] : (b.statusFrac !== 'no' ? statusLabel[b.statusFrac] + ' (fraccionant)' : statusLabel.no);
    const statusCls = b.statusNoFrac !== 'no' ? b.statusNoFrac : (b.statusFrac !== 'no' ? b.statusFrac : 'no');

    return `<div class="redux-block${isBest?' best':''}">
      <div class="redux-block-header">
        <span>Hipoteca ${b.pct}% — ${fmt(b.mortgage)}</span>
        ${isBest?'<span class="star">★ Millor</span>':''}
      </div>
      <div class="redux-sub">
        <div class="redux-col">
          <div class="redux-col-title">Sense fraccionar ITP</div>
          <div class="redux-line"><span class="k">Entrada</span><span class="v">${fmt(b.entry)}</span></div>
          <div class="redux-line"><span class="k">ITP</span><span class="v">${fmt(b.itpTotal)}</span></div>
          <div class="redux-line"><span class="k">Agència</span><span class="v">${fmt(b.agencyGross)}</span></div>
          <div class="redux-line"><span class="k">Desp. fixes</span><span class="v">${fmt(b.fixedCosts)}</span></div>
          <div class="redux-line total"><span class="k">Cost inicial</span><span class="v">${fmt(b.costNoFrac)}</span></div>
          <div class="redux-line"><span class="k">Disponible</span><span class="v">${fmtShort(available)}</span></div>
          <div class="redux-line"><span class="k">Diferència</span><span class="v" style="color:${b.diffNoFrac>=0?'var(--green)':'var(--red)'}">${b.diffNoFrac>=0?'+':''}${fmt(b.diffNoFrac)}</span></div>
          <div style="margin-top:4px"><span class="badge ${b.statusNoFrac==='ok'?'badge-ok':b.statusNoFrac==='warn'?'badge-warn':'badge-no'}">${statusLabel[b.statusNoFrac]}</span></div>
        </div>
        <div class="redux-col">
          <div class="redux-col-title">Fraccionant ITP (${Math.round(fracMo)}m)</div>
          <div class="redux-line"><span class="k">Entrada</span><span class="v">${fmt(b.entry)}</span></div>
          <div class="redux-line"><span class="k">Agència</span><span class="v">${fmt(b.agencyGross)}</span></div>
          <div class="redux-line"><span class="k">Desp. fixes</span><span class="v">${fmt(b.fixedCosts)}</span></div>
          <div class="redux-line total"><span class="k">Cost inicial</span><span class="v">${fmt(b.costFrac)}</span></div>
          <div class="redux-line"><span class="k">Disponible</span><span class="v">${fmtShort(available)}</span></div>
          <div class="redux-line"><span class="k">Diferència</span><span class="v" style="color:${b.diffFrac>=0?'var(--green)':'var(--red)'}">${b.diffFrac>=0?'+':''}${fmt(b.diffFrac)}</span></div>
          <div style="margin-top:4px"><span class="badge ${b.statusFrac==='ok'?'badge-ok':b.statusFrac==='warn'?'badge-warn':'badge-no'}">${statusLabel[b.statusFrac]}</span></div>
        </div>
      </div>
      <div class="redux-monthly">
        <div class="redux-monthly-grid">
          <div class="redux-monthly-item"><div class="val">${fmt(b.monthly)}</div><div class="lbl">Quota hipoteca/mes</div></div>
          <div class="redux-monthly-item"><div class="val">${fmt(b.totalDuring)}</div><div class="lbl">Total/mes (durant fracc.)</div></div>
          <div class="redux-monthly-item"><div class="val">${fmt(b.totalAfter)}</div><div class="lbl">Total/mes (post fracc.)</div></div>
        </div>
      </div>
      <div class="redux-status ${statusCls}">${bestLabel}</div>
    </div>`;
  }).join('');
}

// ---- Bind ----
document.querySelectorAll('#tab-full input[type=number]').forEach(el => el.addEventListener('input', calcFull));
$('fracToggle').addEventListener('change', calcFull);
document.querySelectorAll('#tab-redux input[type=number]').forEach(el => el.addEventListener('input', calcRedux));

// Sync price between views
$('price').addEventListener('input', () => { $('rx-price').value = $('price').value; });
$('rx-price').addEventListener('input', () => { $('price').value = $('rx-price').value; });

renderChips();
calcFull();
calcRedux();
</script>
</body>
</html>
